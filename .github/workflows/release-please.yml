name: release-please

on:
  push:
    branches: [release]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Sync version numbers to release PR
        if: steps.release.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          gh pr checkout "$PR_NUMBER"

          sudo apt-get update
          sudo apt-get install -y devscripts

          NEW_VERSION=$(jq -r '."."' .release-please-manifest.json)
          CHANGELOG_VERSION=${NEW_VERSION//-/ }
          CHANGELOG_DATE=$(LC_ALL=C date +"%a %b %d %Y")

          MAINTAINER_NAME="${GITHUB_ACTOR}"
          MAINTAINER_EMAIL="${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

          if ! grep -q -- "- Upstream sync to ${CHANGELOG_VERSION}$" linux/lightzone.changes; then
            {
              echo "${CHANGELOG_DATE} - ${MAINTAINER_NAME} <${MAINTAINER_EMAIL}>"
              echo
              echo "- Upstream sync to ${CHANGELOG_VERSION}"
              echo
              echo "-------------------------------------------------------------------"
              cat linux/lightzone.changes
            } > linux/lightzone.changes.new
            mv linux/lightzone.changes.new linux/lightzone.changes
          fi

          sed -i -E "s/^(DISTVERSION=[[:space:]]*).*/\1${NEW_VERSION}/" freebsd-ports/graphics/lightzone/Makefile
          sed -i -E 's/^(VERSION=\$\{VERSION:-).*(\})$/\1'"${NEW_VERSION}"'\2/' linux/lightzone.SlackBuild
          sed -i -E "s/^(Version:[[:space:]]*).*/\1${NEW_VERSION}/" linux/lightzone.spec
          sed -i -E "s/^(echo Starting LightZone version ).*( \.\.\.)$/\1${NEW_VERSION}\2/" linux/products/lightzone
          sed -i -E '/<key>CFBundleVersion<\/key>/{n;s/^([[:space:]]*<string>).*(<\/string>)$/\1'"${NEW_VERSION}"'\2/;}' macosx/src/main/resources/Info.plist

          RELEASE_DATE=$(date +"%Y-%m-%d")

          if ! grep -q -- "<release version=\"${NEW_VERSION}\"" linux/products/io.github.ktgw0316.LightZone.metainfo.xml; then
            {
              echo "    <release version=\"${NEW_VERSION}\" date=\"${RELEASE_DATE}\">"
              echo "      <url>https://github.com/ktgw0316/LightZone/releases/tag/${NEW_VERSION}</url>"
              echo "    </release>"
            } >> linux/products/io.github.ktgw0316.LightZone.metainfo.xml
          fi

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add freebsd-ports/graphics/lightzone/Makefile linux/lightzone.SlackBuild linux/lightzone.spec linux/lightzone.changes
            git add -f linux/products/lightzone linux/products/io.github.ktgw0316.LightZone.metainfo.xml
            git add macosx/src/main/resources/Info.plist
            git commit -m "chore: Sync version numbers to ${NEW_VERSION}"
            git push
          fi
