name: CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, macos-14, ubuntu-latest]
        java: ['21']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'liberica'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-
    - name: Install MSYS2 on Windows
      if: startsWith(matrix.os, 'windows')
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: git iconv make
        pacboy: lcms2 libraw lensfun ntldd-git pkgconf toolchain
    - name: Build on Windows
      if: startsWith(matrix.os, 'windows')
      shell: msys2 {0}
      run: |
        export PATH=/msys64/usr/bin/:/msys32/usr/bin/:$PATH
        export MSSDK_HOME=/c/Program\ Files\ \(x86\)/Windows\ Kits/10/Lib/10.0.22621.0
        ./gradlew jpackage
        # MSYSTEM=MINGW32 TARGET_ARCH=i686 ./gradlew jpackage
    - name: Build on macOS
      if: startsWith(matrix.os, 'macos')
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig
        brew install lensfun libomp libraw
        if [ "${{ matrix.os }}" == "macos-14" ]; then
          export LIBOMP_PATH=/opt/homebrew/opt/libomp
          TARGET_ARCH=arm64 ./gradlew jpackage
        else
          ./gradlew jpackage
        fi
    - name: Build on Ubuntu
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo add-apt-repository -y ppa:lightzone-team/lightzone
        sudo apt update -y
        sudo apt install -y \
          libejml-java \
          libglib2.0-dev \
          libjetbrains-annotations-java \
          libjiconfont-font-awesome-java \
          libjiconfont-google-material-design-icons-java \
          libjiconfont-swing-java \
          liblensfun-dev \
          liblombok-java \
          libraw-dev \
          libtiff-dev \
          tidy
        ./gradlew jpackage
    - name: Upload Artifacts on Windows
      if: startsWith(matrix.os, 'windows')
      uses: actions/upload-artifact@v7
      with:
        name: lightzone-${{ matrix.os }}
        path: |
          windows/build/jpackage/LightZone-*.msi
    - name: Upload Artifacts on macOS
      if: startsWith(matrix.os, 'macos')
      uses: actions/upload-artifact@v7
      with:
        name: lightzone-${{ matrix.os }}
        path: |
          macosx/build/jpackage/LightZone-*.dmg
    - name: Upload Artifacts on Ubuntu
      if: startsWith(matrix.os, 'ubuntu')
      uses: actions/upload-artifact@v7
      with:
        name: lightzone-${{ matrix.os }}
        path: |
          linux/build/jpackage/lightzone*.deb

  build_on_Fedora:
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
    - uses: actions/checkout@v6
    - name: Build on Fedora
      run: |
        sudo dnf install -y \
          LibRaw-devel \
          gcc-c++ \
          git \
          java-21-openjdk-devel \
          java-21-openjdk-jmods \
          lcms2-devel \
          lensfun-devel \
          libX11-devel \
          libjpeg-turbo-devel \
          libtiff-devel \
          libxml2 \
          make \
          patch \
          pkgconfig \
          rpm-build \
          rsync
        patch -p1 < linux/fedora.patch
        export JAVA_HOME=/usr/lib/jvm/java-21-openjdk
        ./gradlew jpackage
    - name: Upload Artifacts on Fedora
      uses: actions/upload-artifact@v7
      with:
        name: lightzone-fedora
        path: |
          linux/build/jpackage/lightzone*.rpm

  release:
    needs: [build, build_on_Fedora]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        merge-multiple: true
    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PRERELEASE_FLAG=""
        if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi
        gh release create "${GITHUB_REF_NAME}" \
          --repo "${GITHUB_REPOSITORY}" \
          --title "${GITHUB_REF_NAME}" \
          --generate-notes \
          ${PRERELEASE_FLAG} \
          artifacts/*

